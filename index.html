<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PLANT – Polygon Hotspot Demo (p5)</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
  <!-- p5.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <script>
    /**
     * Features:
     * - Background image (cover)
     * - Polygon hotspot (tilted card)
     * - Hover glow + cursor HAND
     * - Click opens modal with blurred background and floating detail image
     * - Close by clicking X / clicking anywhere / ESC
     * - Debug mode: press D to toggle, drag polygon points to fit the card, logs coords
     */

   let bg;
let detailImages = {};
let isOpen = false;
let activeHotspot = null;   // 当前打开的是哪一个
let blurredBg = null;
let closeBtn = { x: 0, y: 0, r: 18 };

// 每个热点一个对象
let hotspots = [
  {
    id: 'card1',
    imageKey: 'diagram1',
    hoverT: 0,
    poly: [
      { x: 2477, y: 1286 },
      { x: 2913, y: 1832 },
      { x: 2180, y: 2544 },
      { x: 1655, y: 1966 }
    ]
  },
  {
    id: 'booklet',
    imageKey: 'bookletDetail',
    hoverT: 0,
    poly: [
      { x: 1102, y: 969 },
      { x: 1703, y: 921 },
      { x: 1758, y: 1442 },
      { x: 1319, y: 1499 }
    ]
  },
  {
    id: 'tax',
    imageKey: 'taxDetail',
    hoverT: 0,
    poly: [
      { x: 24, y: 2035 },
      { x: 688, y: 1449 },
      {x: 1148, y: 1609 },
      {x: 787, y: 1810},
      {x: 1349, y: 2390 },
      { x: 1154, y: 2597  }
    ]
  },
    {
    id: 'energy',
    imageKey: 'energyDetail',
    hoverT: 0,
    poly: [
      {x: 787, y: 1813 },
      {x: 1304, y: 1549 },
      {x: 1730, y: 2044},
      {x: 1331, y: 2324 }
    ]
  },
    {
    id: 'diagram2',
    imageKey: 'diagram2Detail',
    hoverT: 0,
    poly: [
      {x: 207, y: 1215},
      {x: 1060, y: 1002},
      {x: 1229, y: 1323},
      { x: 339, y: 1561 }
    ]
  },
    {
    id: 'diagram3',
    imageKey: 'diagram3Detail',
    hoverT: 0,
    poly: [
      {x: 0, y: 1233},
      {x: 661, y: 843},
      {x: 1003, y: 990},
      {x: 213, y: 1215},
      { x: 258, y: 1431 }
    ]
  },
  {
    id: 'magazine',
    imageKey: 'magazineDetail',
    hoverT: 0,
    poly: [
      {x: 2547, y: 831},
      {x: 3055, y: 840},
      {x: 3208, y: 1455},
      {x: 2602, y: 1431}
    ]
  }
];



    let hoverT = 0;          // 0..1 hover animation


    // Debug dragging
    let debug = false;
    let dragIdx = null;
    const handleR = 10;

function preload() {
  bg = loadImage('bg.jpeg');

  detailImages.diagram1 = loadImage('diagram1.png');
  detailImages.bookletDetail = loadImage('booklet.jpeg');
  detailImages.taxDetail = loadImage('tax.jpg');
  detailImages.energyDetail = loadImage('greenenergy.jpg');
  detailImages.diagram2Detail = loadImage('diagram2.jpg');
   detailImages.diagram3Detail = loadImage('diagram3.jpg');
   detailImages.magazineDetail = loadImage('magazine.jpg');
}

    function setup() {
      createCanvas(windowWidth, windowHeight);
     pixelDensity(Math.min(2, displayDensity()));
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      blurredBg = null;
    }

    // --- Cover transform ---
    function computeCoverTransform() {
      const s = Math.max(width / bg.width, height / bg.height);
      const dw = bg.width * s;
      const dh = bg.height * s;
      const ox = (width - dw) / 2;
      const oy = (height - dh) / 2;
      bgScale = s;
      bgOffX = ox;
      bgOffY = oy;
    }

    // Map original image point -> screen
    function imgPtToScreen(pt) {
      return {
        x: bgOffX + pt.x * bgScale,
        y: bgOffY + pt.y * bgScale
      };
    }

    // Map screen -> original image point
    function screenPtToImg(pt) {
      return {
        x: (pt.x - bgOffX) / bgScale,
        y: (pt.y - bgOffY) / bgScale
      };
    }

    function polyToScreen(poly) {
      return poly.map(imgPtToScreen);
    }

    // Point-in-polygon (ray casting)
    function pointInPoly(px, py, poly) {
      let inside = false;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i].x, yi = poly[i].y;
        const xj = poly[j].x, yj = poly[j].y;

        const intersect =
          ((yi > py) !== (yj > py)) &&
          (px < (xj - xi) * (py - yi) / ((yj - yi) || 1e-9) + xi);

        if (intersect) inside = !inside;
      }
      return inside;
    }

    function centroid(poly) {
      let x = 0, y = 0;
      for (const p of poly) { x += p.x; y += p.y; }
      return { x: x / poly.length, y: y / poly.length };
    }

    // Expand polygon outward a bit (for hover glow)
    function expandPoly(poly, amount) {
      const c = centroid(poly);
      return poly.map(p => {
        const vx = p.x - c.x;
        const vy = p.y - c.y;
        const len = Math.hypot(vx, vy) || 1e-9;
        const nx = vx / len;
        const ny = vy / len;
        return { x: p.x + nx * amount, y: p.y + ny * amount };
      });
    }

    function drawBackground() {
      computeCoverTransform();
      image(bg, bgOffX, bgOffY, bg.width * bgScale, bg.height * bgScale);
    }

    function buildBlurredBackground() {
      blurredBg = createGraphics(width, height);
      blurredBg.pixelDensity(1);

      blurredBg.push();
      blurredBg.image(bg, bgOffX, bgOffY, bg.width * bgScale, bg.height * bgScale);
      blurredBg.filter(BLUR, 8);
      blurredBg.noStroke();
      blurredBg.fill(0, 120);
      blurredBg.rect(0, 0, width, height);
      blurredBg.pop();
    }

    function drawPolygon(poly, doFill, doStroke) {
      if (doFill) beginShape();
      else beginShape();
      for (const p of poly) vertex(p.x, p.y);
      endShape(CLOSE);
    }

 function draw() {
  background(0);
  drawBackground();

  let anyHover = false;

  // 所有 hotspot 的 hover 和描边
  if (!isOpen) {
    for (let hs of hotspots) {
      const screenPoly = polyToScreen(hs.poly);
      const hovering = pointInPoly(mouseX, mouseY, screenPoly);

      hs.hoverT = lerp(hs.hoverT, hovering ? 1 : 0, 0.15);

      if (hovering) anyHover = true;

      if (hs.hoverT > 0.001) {
        const glowPoly = expandPoly(screenPoly, 10 * hs.hoverT);

        push();
        noStroke();
        fill(255, 26 * hs.hoverT);
        beginShape();
        for (const p of glowPoly) vertex(p.x, p.y);
        endShape(CLOSE);

        noFill();
        stroke(255, 150 * hs.hoverT);
        strokeWeight(2);
        beginShape();
        for (const p of screenPoly) vertex(p.x, p.y);
        endShape(CLOSE);
        pop();
      }
    }
  }

  // cursor
  if (isOpen) cursor(ARROW);
  else cursor(anyHover ? HAND : ARROW);

  // modal
  if (isOpen && activeHotspot) {
    if (!blurredBg) buildBlurredBackground();
    image(blurredBg, 0, 0);

    const detail = detailImages[activeHotspot.imageKey];
    if (detail) {
      const maxW = width * 0.72;
      const maxH = height * 0.78;

      const ar = detail.width / detail.height;
      let dw = maxW;
      let dh = dw / ar;
      if (dh > maxH) {
        dh = maxH;
        dw = dh * ar;
      }

      const cx = width / 2;
      const cy = height / 2;

      push();
    //   noStroke();
    //   fill(0, 90);
    //   rectMode(CENTER);
    //   rect(cx + 8, cy + 10, dw, dh, 14);

      imageMode(CENTER);
      image(detail, cx, cy, dw, dh);

    //   noFill();
    //   stroke(255, 120);
    //   strokeWeight(1);
    //   rect(cx, cy, dw, dh, 14);
      pop();

    closeBtn.x = cx;
    closeBtn.y = cy + dh / 2 + 30; // 30 可以自己调距离

      push();
      noStroke();
      fill(255, 220);
      circle(closeBtn.x, closeBtn.y, closeBtn.r * 2);

      stroke(0, 180);
      strokeWeight(2);
      line(closeBtn.x - 6, closeBtn.y - 6, closeBtn.x + 6, closeBtn.y + 6);
      line(closeBtn.x + 6, closeBtn.y - 6, closeBtn.x - 6, closeBtn.y + 6);
      pop();
    }
  }

  // debug
  if (debug && !isOpen) {
    push();
    noStroke();
    fill(0, 90);
    rect(0, 0, width, height);

    image(bg, bgOffX, bgOffY, bg.width * bgScale, bg.height * bgScale);

    for (let hs of hotspots) {
      const poly = polyToScreen(hs.poly);

      noFill();
      stroke(0, 255, 0, 220);
      strokeWeight(2);
      beginShape();
      for (const p of poly) vertex(p.x, p.y);
      endShape(CLOSE);

      textAlign(LEFT, CENTER);
      textSize(12);
      for (let i = 0; i < poly.length; i++) {
        const p = poly[i];
        fill(255);
        noStroke();
        circle(p.x, p.y, handleR * 2);

        fill(0);
        text(`${hs.id}-${i}`, p.x + 12, p.y);
      }
    }

    pop();
  }
}

function mousePressed() {
  if (!bg) return;

  if (isOpen) {
    const d = dist(mouseX, mouseY, closeBtn.x, closeBtn.y);
    if (d <= closeBtn.r) {
      isOpen = false;
      activeHotspot = null;
      return;
    }
    isOpen = false;
    activeHotspot = null;
    return;
  }

  if (debug) {
    for (let h = 0; h < hotspots.length; h++) {
      const poly = polyToScreen(hotspots[h].poly);
      for (let i = 0; i < poly.length; i++) {
        if (dist(mouseX, mouseY, poly[i].x, poly[i].y) <= handleR + 4) {
          dragIdx = { hotspotIndex: h, pointIndex: i };
          return;
        }
      }
    }
  }

  for (let hs of hotspots) {
    const screenPoly = polyToScreen(hs.poly);
    if (pointInPoly(mouseX, mouseY, screenPoly)) {
      activeHotspot = hs;
      isOpen = true;
      blurredBg = null;
      return;
    }
  }
}

    function mouseDragged() {
  if (!debug) return;
  if (!dragIdx) return;

  const imgPt = screenPtToImg({ x: mouseX, y: mouseY });
  const hs = hotspots[dragIdx.hotspotIndex];

  hs.poly[dragIdx.pointIndex].x = constrain(imgPt.x, 0, bg.width);
  hs.poly[dragIdx.pointIndex].y = constrain(imgPt.y, 0, bg.height);
}

 function mouseReleased() {
  dragIdx = null;
}

    function keyPressed() {
      if (keyCode === ESCAPE && isOpen) {
        isOpen = false;
        return;
      }

      if (key === 'd' || key === 'D') {
        debug = !debug;
        dragIdx = -1;
        return;
      }

    //   if (key === 'p' || key === 'P') {
    //     // Print current polygon coords (image space) to console
    //     console.log('hotspotPoly = [');
    //     hotspotPoly.forEach(p => console.log(`  { x: ${Math.round(p.x)}, y: ${Math.round(p.y)} },`));
    //     console.log('];');
    //   }
    if (key === 'p' || key === 'P') {
  hotspots.forEach(hs => {
    console.log(`${hs.id}: [`);
    hs.poly.forEach(p => console.log(`  { x: ${Math.round(p.x)}, y: ${Math.round(p.y)} },`));
    console.log(']');
  });
}
    }
  </script>
</body>
